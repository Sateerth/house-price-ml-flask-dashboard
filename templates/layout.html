<!DOCTYPE html>
<html>
<head>
<title>ML Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/darkly/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== BODY ===== */
body {
    background:#0f172a;
    color:white;
    font-family:Arial;
    transition:0.3s;
}

/* ===== LIGHT MODE ===== */
.light-mode {
    background:white;
    color:black;
}

/* ===== SIDEBAR ===== */
.sidebar {
    height:100vh;
    width:240px;
    position:fixed;
    background:#020617;
    padding-top:20px;
}

/* Sidebar Links */
.sidebar a {
    display:block;
    padding:15px;
    color:#cbd5e1;
    text-decoration:none;
    transition:0.2s;
}

.sidebar a:hover {
    background:#1e293b;
    color:white;
}

/* ===== CONTENT ===== */
.content {
    margin-left:240px;
    padding:20px;
}

/* ===== CARDS ===== */
.card {
    border-radius:12px;
    padding:15px;
    background:linear-gradient(145deg,#1e293b,#020617);
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

/* ===== LIGHT MODE FIXES ===== */
.light-mode .sidebar {
    background:#e2e8f0;
}

.light-mode .sidebar a {
    color:#1e293b;
}

.light-mode .sidebar a:hover {
    background:#cbd5e1;
}

.light-mode .card {
    background:#f2f2f2;
    color:black;
}

.light-mode .content {
    background:white;
}

.light-mode h4,
.light-mode p {
    color:black;
}

/* ===== BUTTON ===== */
.btn-toggle {
    position:fixed;
    top:10px;
    right:10px;
    z-index:1000;
}

/* ===== STATUS DOT ===== */
.online-dot {
    color:#22c55e;
    font-size:12px;
}

</style>

</head>

<body>

<!-- 🌗 THEME TOGGLE -->
<button class="btn btn-light btn-toggle" onclick="toggleTheme()">
🌙 / ☀️
</button>

<!-- ===== SIDEBAR ===== -->
<div class="sidebar">

<h4 class="text-center">🏠 ML Dashboard</h4>

<!-- 👤 USER -->
<p class="text-center text-light">
👤 {{ session.get('user', 'Guest') }}
</p>

<p class="text-center online-dot">
● Online
</p>

<hr class="text-secondary">

<a href="/dashboard">📊 Dashboard</a>
<a href="/predict">🤖 Predict</a>
<a href="/analytics">📈 Analytics</a>
<a href="/upload">📁 Upload CSV</a>
<a href="/download">⬇ Download CSV</a>
<a href="/download_pdf">📄 Export PDF</a>

<hr class="text-secondary">

<a href="/logout" class="text-danger">🚪 Logout</a>

</div>

<!-- ===== MAIN CONTENT ===== -->
<div class="content">
{% block content %}{% endblock %}
</div>

<!-- ===== SCRIPT ===== -->
<script>
function toggleTheme(){
    document.body.classList.toggle("light-mode");
}
</script>

</body>
</html>
