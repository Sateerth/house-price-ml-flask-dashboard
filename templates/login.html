<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
}

/* LEFT PANEL */
.left-panel{
    flex:1;
    background: linear-gradient(135deg,#1e1b4b,#312e81);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    text-align:center;
}

.left-panel h1{
    font-size:40px;
    font-weight:bold;
}

.left-panel p{
    opacity:0.8;
}

/* RIGHT PANEL */
.right-panel{
    flex:1;
    background:#020617;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* FORM */
.form-box{
    width:350px;
}

.form-control{
    background:#1e293b;
    border:none;
    color:white;
    padding:12px;
}

.form-control::placeholder{
    color:#94a3b8;
}

.form-control:focus{
    background:#1e293b;
    color:white;
    box-shadow:none;
    border:1px solid #06b6d4;
}

/* BUTTON */
.btn-login{
    background: linear-gradient(90deg,#6366f1,#06b6d4);
    border:none;
    padding:10px;
    font-weight:bold;
}

.btn-login:hover{
    opacity:0.9;
}

/* LINK */
a{
    color:#60a5fa;
    text-decoration:none;
}

/* SMOOTH UI */
*{
    transition:0.3s ease;
}
</style>

</head>

<body>

<div style="display:flex; height:100vh;">

    <!-- LEFT PANEL -->
    <div class="left-panel">
        <h1>📊 ML Dashboard</h1>
        <p>Smart Analytics & Prediction Platform</p>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">

        <div class="form-box">

            <h3 class="text-white mb-3">Welcome Back</h3>

            <form method="POST">

                <input type="email" name="email"
                       placeholder="Email"
                       class="form-control mb-3" required>

                <input type="password" name="password"
                       placeholder="Password"
                       class="form-control mb-3" required>

                <button class="btn btn-login w-100">
                    Sign In
                </button>

            </form>

            <p class="text-center text-light mt-3">
                Don't have an account?
                <a href="/signup">Create one</a>
            </p>

        </div>

    </div>

</div>

</body>
</html>
